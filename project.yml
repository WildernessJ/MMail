name: MMail
options:
  bundleIdPrefix: studio.cobalt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  swift-nio:
    url: https://github.com/apple/swift-nio
    from: 2.64.0
  swift-nio-ssl:
    url: https://github.com/apple/swift-nio-ssl
    from: 2.24.0
  swift-nio-imap:
    url: https://github.com/apple/swift-nio-imap
    revision: 01de1f9a29df31f77e87c2d9248940de7233ee1e

targets:
  MMail:
    type: application
    platform: macOS
    sources:
      - path: MMail
    dependencies:
      - package: swift-nio
        product: NIO
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio-ssl
        product: NIOSSL
      - package: swift-nio-imap
        product: NIOIMAP
    settings:
      base:
        PRODUCT_NAME: MMail
        PRODUCT_BUNDLE_IDENTIFIER: studio.cobalt.MMail
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MMail
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ENABLE_PREVIEWS: YES

  MMailTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MMailTests
    dependencies:
      - target: MMail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.cobalt.MMailTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MMail:
    build:
      targets:
        MMail: all
        MMailTests: [test]
    test:
      targets:
        - MMailTests
